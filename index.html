<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Minha Página de Entrada - Google</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #ffffff;
      color: #202124;
      text-align: center;
    }

    header {
      padding: 20px;
      text-align: right;
    }

    header a {
      margin: 0 10px;
      text-decoration: none;
      color: #202124;
      font-size: 14px;
    }

    .conteiner {
      margin-top: 100px;
    }

    h1 {
      font-size: 80px;
      margin-bottom: 20px;
      color: #4285f4;
    }

    .caixa-busca {
      width: 90%;
      max-width: 550px;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #dfe1e5;
      border-radius: 30px;
      outline: none;
    }

    .botoes {
      margin-top: 25px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 4px;
      background-color: #f8f9fa;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      border: 1px solid #dadce0;
    }

    section {
      margin: 60px auto;
      max-width: 800px;
      padding: 20px;
      text-align: left;
    }

    footer {
      margin-top: 80px;
      padding: 20px;
      background-color: #f2f2f2;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <a href="#">Gmail</a>
    <a href="#">Imagens</a>
  </header>

  <div class="conteiner">

    <section>
      <h1>Google</h1>
      <h2>Página de entrada funcional</h2>
      <h3>Exercício de HTML</h3>
      <h4>Hospedagem no Github Pages</h4>
      <h5>Aluno: Lucas da Fonseca</h5>
      <h6>Disciplina: Introdução ao Desenvolvimento Web</h6>

      <form action="https://www.google.com/search" method="GET">

        <input 
          class="caixa-busca" 
          type="text" 
          name="q" 
          placeholder="Pesquisar no Google"
          required
        >

        <div class="botoes">
          <button type="submit">Pesquisa Google</button>
          <button type="submit" name="btnI" value="1">
            Estou com sorte
          </button>
        </div>

      </form>
    </section>

  </div>

</body>
</html>
