<doctype html>
    <html lang="pt-BR">
        <head>
            <style>
                header {
                    background-color: rgb(75, 75, 75);
                    flex: 1;
                }
                section {
                    background-color: rgb(133, 131, 131);
                    flex: 7;
                    order: 2;
                }
                article {
                    background-color: rgb(200, 200, 200);
                }
                aside {
                    background-color: rgb(250, 250, 250);
                    flex: 3;
                    order: 1;
                }
                footer {
                    background-color: rgb(255, 255, 255);
                    flex: 1;
                }
                .container {
                    display: flex;
                    flex:8;
                }
                p{ text-align: center;
                 }
                 html, body{  
                    margin: 0;
                    height: 100%;
                    overflow: hidden;
                 }
                 .container-v {
                    flex-direction: column;
                    height: 100%;
                    display: flex;
                    
                 }
            </style>
            <meta charset="UTF-8">
            <title>Lucas</title>
        </head>
        <body>
            <div class="container-v">
            <header>
                <h1>Lucas</h1>
            </header>
            <div class="container">
            <section>
                <p>Selection</p>
            
             <article>
                <p>Article</p>
             </article>
            </section>
            <aside>
                <p>Aside</p>
            </aside>
            </div>
            <footer>
                <p>Footer</p>
            </footer>
        </div>
        </body>
    </html>
